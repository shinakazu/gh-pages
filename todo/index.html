<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <p><a href="../">&larr; Back</a></p>
    <h1>TODO</h1>
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="What needs to be done?" autofocus>
      <button type="submit">Add</button>
    </form>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
    <ul id="todo-list"></ul>
    <div id="todo-footer" class="footer hidden">
      <span id="todo-count"></span>
      <button id="clear-completed">Clear Completed</button>
    </div>
    <p style="text-align:center;margin-top:24px;font-size:13px"><a href="https://github.com/shinakazu/gh-pages/blob/main/todo/README.md" target="_blank" rel="noopener noreferrer" style="color:#aaa;text-decoration:none">README.md</a></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
